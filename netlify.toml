[build]
  publish = "frontend/dist"
  command = "cd frontend && npm ci && npm run build"
  base = "."

[build.environment]
  NODE_VERSION = "20"
  NPM_VERSION = "10"

[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200